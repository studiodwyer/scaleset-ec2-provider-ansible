---
- name: Check if scaleset-ec2-provider is installed
  ansible.builtin.stat:
    path: "{{ scaleset_ec2_provider_install_dir }}/scaleset-ec2-provider"
  register: scaleset_ec2_provider_binary_stat

- name: Get installed version
  ansible.builtin.command: "{{ scaleset_ec2_provider_install_dir }}/scaleset-ec2-provider --version"
  register: _scaleset_ec2_provider_installed_version_raw
  changed_when: false
  failed_when: false

- name: Set installed version fact
  ansible.builtin.set_fact:
    scaleset_ec2_provider_installed_version: >-
      {{ (_scaleset_ec2_provider_installed_version_raw.stdout
      | regex_search('[0-9]+\.[0-9]+\.[0-9]+')) | default('', true) }}

- name: Resolve pinned version
  ansible.builtin.set_fact:
    scaleset_ec2_provider_resolved_version: "{{ scaleset_ec2_provider_version }}"
  when: scaleset_ec2_provider_version != "latest"

- name: Resolve latest version from github
  when: scaleset_ec2_provider_version == "latest"
  block:
    - name: Query github releases api
      ansible.builtin.uri:
        url: "{{ scaleset_ec2_provider_github_base_url | regex_replace('^https://github\\.com/', 'https://api.github.com/repos/') }}/releases/latest"
        return_content: true
        headers:
          Accept: "application/vnd.github+json"
      register: _scaleset_ec2_provider_latest

    - name: Set resolved version fact
      ansible.builtin.set_fact:
        scaleset_ec2_provider_resolved_version: "{{ _scaleset_ec2_provider_latest.json.tag_name | regex_replace('^v', '') }}"

- name: Download and install scaleset-ec2-provider
  when: >
    not scaleset_ec2_provider_binary_stat.stat.exists
    or scaleset_ec2_provider_installed_version != scaleset_ec2_provider_resolved_version
  block:
    - name: Create temp directory
      ansible.builtin.tempfile:
        state: directory
      register: scaleset_ec2_provider_temp_dir

    - name: Download scaleset-ec2-provider
      ansible.builtin.unarchive:
        src: >-
          {{ scaleset_ec2_provider_github_base_url }}/releases/download/v{{
          scaleset_ec2_provider_resolved_version }}/scaleset-ec2-provider_{{
          scaleset_ec2_provider_resolved_version }}_Linux_{{
          scaleset_ec2_provider_arch }}.tar.gz
        dest: "{{ scaleset_ec2_provider_temp_dir.path }}"
        remote_src: true

    - name: Install binary
      ansible.builtin.copy:
        src: "{{ scaleset_ec2_provider_temp_dir.path }}/scaleset-ec2-provider"
        dest: "{{ scaleset_ec2_provider_install_dir }}/scaleset-ec2-provider"
        mode: "0755"
        remote_src: true
      notify: Restart scaleset-ec2-provider

    - name: Cleanup temp directory
      ansible.builtin.file:
        path: "{{ scaleset_ec2_provider_temp_dir.path }}"
        state: absent
