---
- name: Create config directory
  ansible.builtin.file:
    path: "{{ scaleset_ec2_provider_config_dir }}"
    state: directory
    mode: "0755"

- name: Create environment file
  ansible.builtin.template:
    src: scaleset_ec2_provider.env.j2
    dest: "{{ scaleset_ec2_provider_config_dir }}/scaleset-ec2-provider.env"
    mode: "0600"
  notify: Restart scaleset-ec2-provider
  no_log: true

- name: Create systemd unit
  ansible.builtin.template:
    src: scaleset_ec2_provider.service.j2
    dest: /etc/systemd/system/scaleset-ec2-provider.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart scaleset-ec2-provider

- name: Enable and start scaleset-ec2-provider
  ansible.builtin.systemd:
    name: scaleset-ec2-provider
    enabled: true
    state: started
    daemon_reload: true
